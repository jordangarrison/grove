name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
    secrets:
      HOMEBREW_TAP_TOKEN:
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: grove-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: grove-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/grove dist/${{ matrix.artifact }}
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 dist/${{ matrix.artifact }}.tar.gz > dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Upload assets to versioned release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ inputs.tag }}" dist/* --clobber

      - name: Update Homebrew tap
        env:
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ inputs.tag }}
        run: |
          VERSION="${TAG#grove-v}"

          SHA_LINUX_X86_64=$(cat dist/grove-linux-x86_64.tar.gz.sha256 | cut -d' ' -f1)
          SHA_MACOS_ARM64=$(cat dist/grove-macos-arm64.tar.gz.sha256 | cut -d' ' -f1)

          git clone https://x-access-token:${HOMEBREW_TAP_TOKEN}@github.com/MichaelVessia/homebrew-tap.git tap
          cd tap

          cat > Formula/grove.rb << FORMULA
          class Grove < Formula
            desc "Minimal workspace manager for AI coding agents"
            homepage "https://github.com/MichaelVessia/grove"
            version "${VERSION}"
            license "MIT"

            on_macos do
              on_arm do
                url "https://github.com/MichaelVessia/grove/releases/download/${TAG}/grove-macos-arm64.tar.gz"
                sha256 "${SHA_MACOS_ARM64}"
              end
            end

            on_linux do
              on_intel do
                url "https://github.com/MichaelVessia/grove/releases/download/${TAG}/grove-linux-x86_64.tar.gz"
                sha256 "${SHA_LINUX_X86_64}"
              end
            end

            def install
              bin.install "grove"
            end

            test do
              assert_match version.to_s, shell_output("#{bin}/grove --version")
            end
          end
          FORMULA

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/grove.rb
          git commit -m "grove ${VERSION}"
          git push
