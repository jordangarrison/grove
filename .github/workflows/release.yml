name: Release

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
      release_name:
        required: true
        type: string
      unstable:
        required: true
        type: boolean

  workflow_run:
    workflows:
      - CI
    types:
      - completed
    branches:
      - master

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag || 'unstable' }}
  cancel-in-progress: true

jobs:
  build:
    if: >-
      (github.event_name == 'workflow_call') ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            artifact: grove-linux-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            artifact: grove-macos-arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.event.workflow_run.head_sha }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package artifact
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/grove dist/${{ matrix.artifact }}
          tar -C dist -czf dist/${{ matrix.artifact }}.tar.gz ${{ matrix.artifact }}
          shasum -a 256 dist/${{ matrix.artifact }}.tar.gz > dist/${{ matrix.artifact }}.tar.gz.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}.tar.gz*

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish unstable release
        if: >-
          (github.event_name == 'workflow_run') ||
          (inputs.unstable)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          if gh release view unstable >/dev/null 2>&1; then
            gh release delete unstable --cleanup-tag --yes
          fi

          gh release create unstable \
            dist/* \
            --title "Unstable" \
            --notes "Automated build from master at $(date -u +%Y-%m-%dT%H:%M:%SZ)." \
            --prerelease

      - name: Upload assets to versioned release
        if: >-
          (github.event_name == 'workflow_call') &&
          (!inputs.unstable)
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: gh release upload "${{ inputs.tag }}" dist/* --clobber
